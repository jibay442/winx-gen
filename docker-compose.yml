services:
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "5173:5173"
    environment:
      - VITE_API_PROXY_TARGET=http://backend:3000
    volumes:
      - assets_data:/app/public/assets
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - winx-net

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - DATABASE_URL=postgresql://winx:winx@db:5432/winx_gen
      - PORT=3000
      - ASSETS_PATH=/app/assets
      - ADMIN_PASSWORD=winx2024
    volumes:
      - assets_data:/app/assets
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3000/health', r => process.exit(r.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - winx-net

  db:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=winx
      - POSTGRES_PASSWORD=winx
      - POSTGRES_DB=winx_gen
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U winx -d winx_gen"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - winx-net

volumes:
  postgres_data:
  assets_data:

networks:
  winx-net:
    driver: bridge
